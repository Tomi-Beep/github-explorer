<section xmlns:th="http://www.thymeleaf.org" class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-2">Login</h1>
                <p class="text-secondary mb-4">Login to save repositories to your own watchlist.</p>

                <div class="alert alert-danger" th:if="${error != null}" th:text="${error}">Error</div>

                <form th:action="@{/login}" method="post">
                    <input type="hidden" name="redirect" th:value="${redirect}">
                    <div class="mb-3">
                        <label class="form-label" for="username">Username</label>
                        <input class="form-control" id="username" type="text" name="username" th:value="${username}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-control" id="password" type="password" name="password" required>
                    </div>
                    <button class="btn btn-primary" type="submit">Login</button>
                    <a class="btn btn-outline-secondary" th:href="@{/register}">Create account</a>
                </form>
            </div>
        </div>
    </div>
</section>
