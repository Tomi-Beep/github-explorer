<section xmlns:th="http://www.thymeleaf.org">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-1">My watchlist</h1>
            <p class="text-secondary mb-0">Repositories saved locally for later.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/}">Search repositories</a>
    </div>

    <div class="alert alert-info" th:if="${repositories.isEmpty()}">
        Your watchlist is empty. Search for a repository to add one.
    </div>

    <div class="card shadow-sm" th:if="${!repositories.isEmpty()}">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Repository</th>
                    <th>Language</th>
                    <th>Stars</th>
                    <th>Tag</th>
                    <th>Note</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="repository : ${repositories}">
                    <td>
                        <a class="fw-semibold text-decoration-none" th:href="${repository.getHtmlUrl()}"
                           th:text="${repository.getFullName()}" target="_blank">owner/repository</a>
                    </td>
                    <td th:text="${repository.getLanguage() == null ? 'Not specified' : repository.getLanguage()}">Language</td>
                    <td th:text="${repository.getStars()}">0</td>
                    <td>
                        <span class="badge text-bg-secondary"
                              th:if="${repository.getTag() != null and !repository.getTag().isBlank()}"
                              th:text="${repository.getTag()}">Tag</span>
                        <span class="text-secondary" th:if="${repository.getTag() == null or repository.getTag().isBlank()}">None</span>
                    </td>
                    <td th:text="${repository.getNote() == null or repository.getNote().isBlank() ? 'No note' : repository.getNote()}">Note</td>
                    <td class="text-end text-nowrap">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/watchlist/edit/{id}(id=${repository.getId()})}">
                            Edit
                        </a>
                        <form class="d-inline" th:action="@{/watchlist/delete/{id}(id=${repository.getId()})}" method="post">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
