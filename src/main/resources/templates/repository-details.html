<section xmlns:th="http://www.thymeleaf.org">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Repository details</h1>
        <a class="btn btn-outline-secondary" th:href="@{/}">New search</a>
    </div>

    <div class="alert alert-danger" th:if="${error != null}" th:text="${error}">Error message</div>

    <div class="card shadow-sm" th:if="${repository != null}">
        <div class="card-body p-4">
            <h2 class="h4 mb-1" th:text="${repository.getFullName()}">owner/repository</h2>
            <p class="text-secondary mb-4" th:text="${repository.getDescription() == null ? 'No description' : repository.getDescription()}">
                Description
            </p>

            <dl class="row mb-4">
                <dt class="col-sm-3">Owner</dt>
                <dd class="col-sm-9" th:text="${repository.getOwner() == null ? 'Unknown' : repository.getOwner().getLogin()}">owner</dd>

                <dt class="col-sm-3">Language</dt>
                <dd class="col-sm-9" th:text="${repository.getLanguage() == null ? 'Not specified' : repository.getLanguage()}">language</dd>

                <dt class="col-sm-3">Stars</dt>
                <dd class="col-sm-9" th:text="${repository.getStars()}">0</dd>

                <dt class="col-sm-3">Forks</dt>
                <dd class="col-sm-9" th:text="${repository.getForks()}">0</dd>

                <dt class="col-sm-3">Open issues</dt>
                <dd class="col-sm-9" th:text="${repository.getOpenIssuesCount()}">0</dd>

                <dt class="col-sm-3">Last updated</dt>
                <dd class="col-sm-9" th:text="${repository.getUpdatedAt()}">date</dd>
            </dl>

            <a class="btn btn-outline-secondary me-2" th:href="${repository.getHtmlUrl()}" target="_blank">Open on GitHub</a>
            <form class="d-inline"
                  th:action="@{/repositories/save/{owner}/{name}(owner=${repository.getOwner().getLogin()},name=${repository.getName()})}"
                  method="post">
                <button class="btn btn-success" type="submit">Save to watchlist</button>
            </form>
        </div>
    </div>
</section>
